spring:
  config:
    activate:
      on-profile: dev
  devtools:
    add-properties: true

  datasource:
    url: jdbc:mysql://localhost:3306/pet_care?useUnicode=true&characterEncoding=UTF-8&useSSL=false&connectionCollation=utf8mb4_unicode_ci&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    hikari: # Connection pool
      max-lifetime: 300000      # 5 phút
      idle-timeout: 60000       # 1 phút
      validation-timeout: 5000  # 5 giây
      minimum-idle: 5
      maximum-pool-size: 20

  jpa:
    show-sql: true
    hibernate:
      format_sql: true
      ddl-auto: none
    properties:
      hibernate:
        default_batch_fetch_size: 50

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB      # Giới hạn kích thước 1 file
      max-request-size: 10MB   # Giới hạn tổng kích thước request (nếu up nhiều file)

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
openapi:
  service:
    api-docs: backend-service
    server: http://localhost:${server.port}
    title: Backend service
    version: 1.0.0

