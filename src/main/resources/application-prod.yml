spring:
  config:
    activate:
      on-profile: prod

  # --- CẤU HÌNH KẾT NỐI DATABASE (TiDB CLOUD) ---
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari: # Connection pool
      max-lifetime: 300000
      idle-timeout: 60000
      validation-timeout: 5000
      minimum-idle: 2
      maximum-pool-size: 5

  # --- CẤU HÌNH JPA / HIBERNATE ---
  jpa:
    show-sql: false
    hibernate:
      format_sql: false
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 50

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # --- CẤU HÌNH GỬI MAIL (GMAIL SMTP) ---
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# --- TỐI ƯU LOGGING CHO PRODUCTION ---
logging:
  level:
    root: INFO # Chỉ in ra các log quan trọng (INFO, WARN, ERROR)
    org.hibernate.SQL: ERROR
    org.hibernate.orm.jdbc.bind: ERROR

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
openapi:
  service:
    api-docs: backend-service
    server: ${BACKEND_URL}
    title: Backend service
    version: 1.0.0

# --- BẢO MẬT JWT ---
jwt:
  expiryMinutes: 60
  expiryDay: 14
  accessKey: ${JWT_ACCESS_KEY}
  refreshKey: ${JWT_REFRESH_KEY}

# --- THÔNG TIN THANH TOÁN VNPAY ---
vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  return-url: ${BACKEND_URL}/payments/vnpay-return

# --- TÍCH HỢP AI GEMINI ---
gemini:
  api-key: ${GEMINI_API_KEY}

# --- UPLOAD ẢNH CLOUDINARY ---
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# --- ĐỊNH TUYẾN FRONTEND ---
app:
  frontend:
    reset-password-url: "${FRONTEND_URL}/reset-password"